<!DOCTYPE html>
<html>
<head>
    <title>Display Books</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        h2 {
            border-bottom: 2px solid #4a90d9;
            padding-bottom: 8px;
            color: #2c3e50;
        }
        .card {
            background: #fff;
            border-radius: 6px;
            padding: 16px 20px;
            margin: 12px 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .card p {
            margin: 8px 0;
        }
        .label {
            font-weight: bold;
            color: #4a90d9;
        }
    </style>
</head>
<body>

    <h2>Book Details</h2>
    <div id="output"></div>

    <script>
        $(document).ready(function() {
            $.getJSON('books.json', function(data) {
                const firstTitle  = data[0].title;
                const secondAuthor = data[1].author;
                const firstGenres  = data[0].genres.join(', ');
                const secondGenres = data[1].genres.join(', ');

                const content =
                    '<div class="card"><p><span class="label">First Book Title:</span> ' + firstTitle + '</p></div>' +
                    '<div class="card"><p><span class="label">Second Book Author:</span> ' + secondAuthor + '</p></div>' +
                    '<div class="card">' +
                        '<p><span class="label">Genres of "' + data[0].title + '":</span> ' + firstGenres + '</p>' +
                        '<p><span class="label">Genres of "' + data[1].title + '":</span> ' + secondGenres + '</p>' +
                    '</div>';

                $('#output').html(content);

                console.log("First Book Title:", firstTitle);
                console.log("Second Book Author:", secondAuthor);
                console.log("Genres of '" + data[0].title + "':", firstGenres);
                console.log("Genres of '" + data[1].title + "':", secondGenres);
            });
        });
    </script>

</body>
</html>
